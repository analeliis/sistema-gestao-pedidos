<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Gestão de Pedidos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="top-header">
      <h1>Sistema de Gestão de Pedidos</h1>
    </header>

    <main class="dashboard">
      <aside class="left-column">
        <section class="card card-blue">
          <h2 class="card-title">📦 Cadastrar / Editar Produto</h2>

          <div class="form-group">
            <input type="text" id="nome" placeholder="Nome do Produto" />
          </div>

          <div class="form-row two-cols">
            <input type="number" id="preco" placeholder="Preço (R$)" />
            <input type="number" id="estoque" placeholder="Estoque" />
          </div>

          <div class="form-group">
            <select id="categoria">
              <option value="">Selecione a Categoria</option>
              <option value="Hardware">Hardware</option>
              <option value="Periféricos">Periféricos</option>
              <option value="Monitores">Monitores</option>
              <option value="Acessórios">Acessórios</option>
            </select>
          </div>

          <button class="btn btn-primary btn-full" onclick="execCadastrar()">
            Salvar Produto
          </button>
        </section>

        <section class="card">
          <h2 class="card-title">🔎 Buscar Produto</h2>

          <div class="form-row search-row">
            <input type="number" id="searchId" placeholder="ID" />
            <button class="btn btn-search" onclick="execBuscar()">Pesquisar</button>
          </div>

          <div id="resultadoBusca" class="search-result"></div>
        </section>
      </aside>

      <section class="right-column">
        <section class="card">
          <h2 class="card-title">📋 Catálogo de Produtos</h2>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nome</th>
                  <th>Categoria</th>
                  <th>Preço</th>
                  <th>Estoque</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="lista-produtos">
                <tr>
                  <td colspan="6" class="empty-cell">Nenhum produto cadastrado.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="card card-green">
          <h2 class="card-title title-green">🛒 Carrinho de Compras</h2>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Produto</th>
                  <th>Preço Unitário</th>
                  <th>Quantidade</th>
                  <th>Subtotal</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="itens-carrinho">
                <tr>
                  <td colspan="5" class="empty-cell">O carrinho está vazio.</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="subtotal-bar">
            <span>Subtotal:</span>
            <strong id="subtotal-carrinho">R$ 0,00</strong>
          </div>

          <div class="checkout-box">
            <h3>Finalizar Pedido</h3>

            <div class="checkout-grid">
              <input type="text" id="nomeCliente" placeholder="Nome Completo" />
              <input type="text" id="cepCliente" placeholder="CEP (71741000)" />
              <input type="text" id="cupom" placeholder="Cupom (DEZOFF)" />
              <button class="btn btn-success btn-full" onclick="execFecharPedido()">
                Confirmar Compra
              </button>
            </div>

            <div id="resultado-final" class="resultado-final hidden"></div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="/src/interface.js"></script>
</body>
</html>
